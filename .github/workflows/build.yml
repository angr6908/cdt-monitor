name: build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {os: linux, arch: amd64}
          - {os: darwin, arch: arm64}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - run: GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -ldflags="-extldflags=-static" -o cdt-monitor-${{ matrix.os }}-${{ matrix.arch }} main.go
      - uses: actions/upload-artifact@v7
        with:
          name: cdt-monitor-${{ matrix.os }}-${{ matrix.arch }}
          path: cdt-monitor-${{ matrix.os }}-${{ matrix.arch }}

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cdt-monitor-linux-amd64

      - run: |
          cat > Dockerfile << 'EOF'
          FROM alpine:latest
          RUN apk add --no-cache tzdata && mkdir -p /app /logs
          COPY cdt-monitor-linux-amd64 /app/cdt-monitor
          RUN chmod +x /app/cdt-monitor
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh
          ENTRYPOINT ["/entrypoint.sh"]
          EOF

          cat > entrypoint.sh << 'EOF'
          #!/bin/sh
          set -e
          ln -sf /logs/cdt-monitor.log /app/cdt-monitor.log
          [ -n "${NAT64_DNS:-}" ] && { echo "nameserver ${NAT64_DNS}" > /tmp/r; cat /etc/resolv.conf >> /tmp/r; cat /tmp/r > /etc/resolv.conf; }
          accounts="["; first=1; i=0
          while true; do
            eval "key=\${ACCOUNT_${i}_ACCESS_KEY_ID:-}"; [ -z "$key" ] && break
            eval "secret=\${ACCOUNT_${i}_ACCESS_KEY_SECRET}"
            eval "region=\${ACCOUNT_${i}_REGION_ID}"
            eval "instance=\${ACCOUNT_${i}_INSTANCE_ID}"
            eval "threshold=\${ACCOUNT_${i}_THRESHOLD_GB}"
            eval "shutdown=\${ACCOUNT_${i}_SHUTDOWN_MODE}"
            [ "$first" -eq 0 ] && accounts="${accounts},"
            accounts="${accounts}{\"access_key_id\":\"${key}\",\"access_key_secret\":\"${secret}\",\"region_id\":\"${region}\",\"instance_id\":\"${instance}\",\"threshold_gb\":${threshold},\"shutdown_mode\":\"${shutdown}\"}"
            first=0; i=$((i+1))
          done
          accounts="${accounts}]"
          cat > /app/conf.json <<JSON
          {"accounts":${accounts},"webhook":{"enabled":${WEBHOOK_ENABLED:-false},"url":"${WEBHOOK_URL:-}"}}
          JSON
          echo "* * * * * /app/cdt-monitor" > /etc/crontabs/root
          exec crond -f -l 2
          EOF

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
