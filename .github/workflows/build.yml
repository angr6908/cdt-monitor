name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME=cdt-monitor-${{ matrix.os }}-${{ matrix.arch }}
          go build -v -o $BINARY_NAME main.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cdt-monitor-${{ matrix.os }}-${{ matrix.arch }}
          path: cdt-monitor-${{ matrix.os }}-${{ matrix.arch }}
