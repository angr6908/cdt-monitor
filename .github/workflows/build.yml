name: build
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME=cdt-monitor-${{ matrix.os }}-${{ matrix.arch }}
          go build -v -o $BINARY_NAME main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdt-monitor-${{ matrix.os }}-${{ matrix.arch }}
          path: cdt-monitor-${{ matrix.os }}-${{ matrix.arch }}

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: cdt-monitor-linux-amd64

      - name: Write Dockerfile
        run: |
          cat << 'DOCKERFILE' > Dockerfile
          FROM alpine:3.19
          RUN apk add --no-cache tzdata
          COPY cdt-monitor-linux-amd64 /usr/local/bin/cdt-monitor
          RUN chmod +x /usr/local/bin/cdt-monitor
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh
          ENTRYPOINT ["/entrypoint.sh"]
          DOCKERFILE

      - name: Write entrypoint.sh
        run: |
          cat << 'ENTRYPOINT' > entrypoint.sh
          #!/bin/sh
          set -e

          CONFIG_FILE="/etc/cdt-monitor/conf.json"
          mkdir -p /etc/cdt-monitor

          # If NAT64_DNS is set, prepend it to resolv.conf so Go's DNS resolver
          # uses the DNS64 nameserver and traffic routes through NAT64
          if [ -n "${NAT64_DNS:-}" ]; then
            echo "nameserver ${NAT64_DNS}" > /tmp/resolv.conf
            cat /etc/resolv.conf >> /tmp/resolv.conf
            cp /tmp/resolv.conf /etc/resolv.conf
            echo "NAT64 DNS configured: ${NAT64_DNS}"
          fi

          accounts="["
          first=1
          i=0
          while true; do
            eval "key=\${ACCOUNT_${i}_ACCESS_KEY_ID:-}"
            [ -z "$key" ] && break

            eval "secret=\${ACCOUNT_${i}_ACCESS_KEY_SECRET}"
            eval "region=\${ACCOUNT_${i}_REGION_ID}"
            eval "instance=\${ACCOUNT_${i}_INSTANCE_ID}"
            eval "threshold=\${ACCOUNT_${i}_THRESHOLD_GB}"
            eval "shutdown=\${ACCOUNT_${i}_SHUTDOWN_MODE}"

            [ "$first" -eq 0 ] && accounts="${accounts},"
            accounts="${accounts}{\"access_key_id\":\"${key}\",\"access_key_secret\":\"${secret}\",\"region_id\":\"${region}\",\"instance_id\":\"${instance}\",\"threshold_gb\":${threshold},\"shutdown_mode\":\"${shutdown}\"}"
            first=0
            i=$((i + 1))
          done
          accounts="${accounts}]"

          if [ "$first" -eq 1 ]; then
            echo "ERROR: No accounts configured. Set ACCOUNT_0_ACCESS_KEY_ID etc." >&2
            exit 1
          fi

          cat > "$CONFIG_FILE" <<JSON
          {
            "accounts": ${accounts},
            "webhook": {
              "enabled": ${WEBHOOK_ENABLED:-false},
              "url": "${WEBHOOK_URL:-}"
            }
          }
          JSON

          echo "* * * * * /usr/local/bin/cdt-monitor -c ${CONFIG_FILE} >> /proc/1/fd/1 2>&1" \
            > /etc/crontabs/root

          exec crond -f -l 2
          ENTRYPOINT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
